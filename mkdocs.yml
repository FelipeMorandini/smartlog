site_name: SmartLog
site_url: https://felipemorandini.github.io/smartlog/
site_description: A fast, ergonomic terminal UI for tailing and filtering JSON and plain-text logs in real time.
site_author: Felipe Pires Morandini

repo_name: felipemorandini/smartlog
repo_url: https://github.com/felipemorandini/smartlog

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage Guide: usage.md
  - Architecture: architecture.md
  - Contributing: contributing.md
  - Changelog: changelog.md
