name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-version:
    name: Validate version tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches Cargo.toml version
        shell: bash
        run: |
          CARGO_VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          TAG="${GITHUB_REF_NAME}"
          if [ "$CARGO_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "Version validated: $TAG == $CARGO_VERSION"

  build:
    needs: validate-version
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Install cross for Linux ARM builds
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --version 0.2.5 --locked

      # Install musl tools for native Linux x86_64 musl builds
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Build with cross for cross-compiled targets
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      # Build natively for all other targets
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}
        env:
          # Statically link the C runtime on Windows to avoid vcruntime140.dll dependency
          RUSTFLAGS: ${{ contains(matrix.target, 'windows') && '-C target-feature=+crt-static' || '' }}

      # Package as tar.gz for Linux and macOS
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../smartlog-${{ matrix.target }}.tar.gz smartlog
          cd ../../..

      # Package as zip for Windows
      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $releaseDir = "target/${{ matrix.target }}/release"
          $bin = "$releaseDir/smartlog.exe"
          if (Test-Path $bin) {
            Push-Location $releaseDir
            Compress-Archive -Path "smartlog.exe" -DestinationPath "../../../smartlog-${{ matrix.target }}.zip"
            Pop-Location
          } else {
            Write-Error "Binary not found at $bin"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartlog-${{ matrix.target }}
          path: smartlog-${{ matrix.target }}.*

  build-deb:
    needs: validate-version
    name: Build .deb (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: deb-${{ matrix.target }}

      - name: Install cargo-deb
        run: cargo install cargo-deb --version 3.6.3 --locked

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Install musl tools
        if: "!matrix.cross"
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package .deb
        run: cargo deb --no-build --target ${{ matrix.target }}

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartlog-deb-${{ matrix.arch }}
          path: target/${{ matrix.target }}/debian/*.deb

  release:
    name: Create Release
    needs: [build, build-deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-aur:
    name: Update AUR package
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH for AUR
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Download release assets and compute SHA256
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/felipemorandini/smartlog/releases/download/${TAG}"

          curl -fSL --retry 3 "${BASE}/smartlog-x86_64-unknown-linux-musl.tar.gz" -o x86_64.tar.gz
          curl -fSL --retry 3 "${BASE}/smartlog-aarch64-unknown-linux-musl.tar.gz" -o aarch64.tar.gz
          curl -fSL --retry 3 "https://raw.githubusercontent.com/felipemorandini/smartlog/${TAG}/LICENSE" -o LICENSE

          SHA_X86_64=$(sha256sum x86_64.tar.gz | cut -d' ' -f1)
          SHA_AARCH64=$(sha256sum aarch64.tar.gz | cut -d' ' -f1)
          SHA_LICENSE=$(sha256sum LICENSE | cut -d' ' -f1)

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "SHA_X86_64=${SHA_X86_64}" >> "$GITHUB_ENV"
          echo "SHA_AARCH64=${SHA_AARCH64}" >> "$GITHUB_ENV"
          echo "SHA_LICENSE=${SHA_LICENSE}" >> "$GITHUB_ENV"

      - name: Clone AUR repo and update PKGBUILD
        run: |
          git clone ssh://aur@aur.archlinux.org/smartlog-bin.git aur-repo
          cp packaging/aur/PKGBUILD aur-repo/PKGBUILD

          cd aur-repo

          # Update version
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Update checksums
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${SHA_X86_64}' '${SHA_LICENSE}')/" PKGBUILD
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${SHA_AARCH64}' '${SHA_LICENSE}')/" PKGBUILD

          # Remove the SKIP comment if present
          sed -i '/^# Update these checksums with: updpkgsums/d' PKGBUILD

          # Generate .SRCINFO (makepkg is not available on Ubuntu)
          # .SRCINFO uses tab indentation for fields under pkgbase/pkgname
          TAB=$'\t'
          URL="https://github.com/felipemorandini/smartlog"
          {
            echo "pkgbase = smartlog-bin"
            echo "${TAB}pkgdesc = A high-performance TUI for log tailing with JSON auto-detection and real-time filtering"
            echo "${TAB}pkgver = ${VERSION}"
            echo "${TAB}pkgrel = 1"
            echo "${TAB}url = ${URL}"
            echo "${TAB}arch = x86_64"
            echo "${TAB}arch = aarch64"
            echo "${TAB}license = MIT"
            echo "${TAB}provides = smartlog"
            echo "${TAB}conflicts = smartlog"
            echo "${TAB}source_x86_64 = ${URL}/releases/download/v${VERSION}/smartlog-x86_64-unknown-linux-musl.tar.gz"
            echo "${TAB}source_x86_64 = ${URL}/raw/v${VERSION}/LICENSE"
            echo "${TAB}sha256sums_x86_64 = ${SHA_X86_64}"
            echo "${TAB}sha256sums_x86_64 = ${SHA_LICENSE}"
            echo "${TAB}source_aarch64 = ${URL}/releases/download/v${VERSION}/smartlog-aarch64-unknown-linux-musl.tar.gz"
            echo "${TAB}source_aarch64 = ${URL}/raw/v${VERSION}/LICENSE"
            echo "${TAB}sha256sums_aarch64 = ${SHA_AARCH64}"
            echo "${TAB}sha256sums_aarch64 = ${SHA_LICENSE}"
            echo ""
            echo "pkgname = smartlog-bin"
          } > .SRCINFO

      - name: Push to AUR
        run: |
          cd aur-repo
          git config user.name "Felipe Pires Morandini"
          git config user.email "felipepiresmorandini@gmail.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "Update to v${VERSION}"
          git push

  update-winget:
    name: Update Winget manifest
    needs: release
    runs-on: windows-latest
    steps:
      - name: Install wingetcreate
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest/self-contained" -OutFile wingetcreate.exe
          if (-not (Test-Path wingetcreate.exe)) { throw "Failed to download wingetcreate" }

      - name: Update and submit manifest
        shell: pwsh
        env:
          WINGET_PAT: ${{ secrets.WINGET_PAT }}
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "${{ github.ref_name }}".TrimStart("v")
          $x64Url = "https://github.com/felipemorandini/smartlog/releases/download/${{ github.ref_name }}/smartlog-x86_64-pc-windows-msvc.zip"
          $arm64Url = "https://github.com/felipemorandini/smartlog/releases/download/${{ github.ref_name }}/smartlog-aarch64-pc-windows-msvc.zip"
          .\wingetcreate.exe update FelipeMorandini.smartlog `
            --version $version `
            --urls $x64Url $arm64Url `
            --submit `
            --token $env:WINGET_PAT

  update-homebrew:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: felipemorandini/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download release assets and compute SHA256
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/felipemorandini/smartlog/releases/download/${TAG}"

          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-musl x86_64-unknown-linux-musl; do
            curl -sL "${BASE}/smartlog-${target}.tar.gz" -o "${target}.tar.gz"
            sha=$(sha256sum "${target}.tar.gz" | cut -d' ' -f1)
            echo "SHA_${target//-/_}=${sha}" >> "$GITHUB_ENV"
          done
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Write updated formula
        shell: bash
        run: |
          cat > homebrew-tap/Formula/smartlog.rb << 'FORMULA'
          class Smartlog < Formula
            desc "A high-performance TUI for log tailing with JSON auto-detection and real-time filtering"
            homepage "https://github.com/felipemorandini/smartlog"
            version "__VERSION__"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/felipemorandini/smartlog/releases/download/v__VERSION__/smartlog-aarch64-apple-darwin.tar.gz"
                sha256 "__SHA_AARCH64_DARWIN__"
              else
                url "https://github.com/felipemorandini/smartlog/releases/download/v__VERSION__/smartlog-x86_64-apple-darwin.tar.gz"
                sha256 "__SHA_X86_64_DARWIN__"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/felipemorandini/smartlog/releases/download/v__VERSION__/smartlog-aarch64-unknown-linux-musl.tar.gz"
                sha256 "__SHA_AARCH64_LINUX__"
              else
                url "https://github.com/felipemorandini/smartlog/releases/download/v__VERSION__/smartlog-x86_64-unknown-linux-musl.tar.gz"
                sha256 "__SHA_X86_64_LINUX__"
              end
            end

            def install
              bin.install "smartlog"
            end

            test do
              assert_match "smartlog", shell_output("#{bin}/smartlog --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' homebrew-tap/Formula/smartlog.rb
          # Substitute placeholders
          sed -i "s/__VERSION__/${VERSION}/g" homebrew-tap/Formula/smartlog.rb
          sed -i "s/__SHA_AARCH64_DARWIN__/${SHA_aarch64_apple_darwin}/g" homebrew-tap/Formula/smartlog.rb
          sed -i "s/__SHA_X86_64_DARWIN__/${SHA_x86_64_apple_darwin}/g" homebrew-tap/Formula/smartlog.rb
          sed -i "s/__SHA_AARCH64_LINUX__/${SHA_aarch64_unknown_linux_musl}/g" homebrew-tap/Formula/smartlog.rb
          sed -i "s/__SHA_X86_64_LINUX__/${SHA_x86_64_unknown_linux_musl}/g" homebrew-tap/Formula/smartlog.rb

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name "Felipe Pires Morandini"
          git config user.email "felipepiresmorandini@gmail.com"
          git add Formula/smartlog.rb
          git diff --cached --quiet && exit 0
          git commit -m "smartlog: update to v${VERSION}"
          git push
